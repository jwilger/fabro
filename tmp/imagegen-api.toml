version = 1
goal = "A cute robot painting a landscape"
graph = "imagegen-api.dot"

[sandbox]
provider = "daytona"

[sandbox.env]
GEMINI_API_KEY = "${env.GEMINI_API_KEY}"

[sandbox.daytona.snapshot]
name = "imagegen-tools-v3"
cpu = 4
memory = 8
disk = 10
dockerfile = { path = "Dockerfile.imagegen" }

services:
  app:
    image: node:20-bookworm
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      - "NODE_ENV=development"
    user: "node"
    volumes:
      - ..:/workspace:cached
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: myapp_dev
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

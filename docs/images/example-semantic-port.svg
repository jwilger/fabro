<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="960" height="160" viewBox="0 0 960 160" xmlns="http://www.w3.org/2000/svg">
<style>
  @media (prefers-color-scheme: dark) {
    [fill="#1a1a1a"] { fill: #e5e5e5; }
    [fill="#666666"] { fill: #aaaaaa; }
    [stroke="#666666"] { stroke: #aaaaaa; }
    [stroke="#999999"] { stroke: #777777; }
  }
</style>
<g>
  <!-- START (Mdiamond) at (40, 42) -->
  <polygon fill="none" stroke="#357f9e" points="40,24 5,42 40,60 75,42"/>
  <polyline fill="none" stroke="#357f9e" points="16,36 16,48"/>
  <polyline fill="none" stroke="#357f9e" points="28,54 52,54"/>
  <polyline fill="none" stroke="#357f9e" points="64,48 64,36"/>
  <polyline fill="none" stroke="#357f9e" points="52,30 28,30"/>
  <text xml:space="preserve" text-anchor="middle" x="40" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Start</text>

  <!-- FETCH (ellipse) at (155, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="155" cy="42" rx="33" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="155" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Fetch</text>

  <!-- ANALYZE (ellipse) at (285, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="285" cy="42" rx="40" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="285" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Analyze</text>

  <!-- PLAN (ellipse) at (395, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="395" cy="42" rx="25" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="395" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Plan</text>

  <!-- IMPLEMENT (ellipse) at (510, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="510" cy="42" rx="46" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="510" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Implement</text>

  <!-- VALIDATE (parallelogram) at ~(640, 42) -->
  <polygon fill="none" stroke="#357f9e" points="608,24 690,24 670,60 588,60"/>
  <text xml:space="preserve" text-anchor="middle" x="639" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Validate</text>

  <!-- GATE (diamond) at (785, 42) -->
  <polygon fill="none" stroke="#357f9e" points="785,18 722,42 785,66 848,42"/>
  <text xml:space="preserve" text-anchor="middle" x="785" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Tests pass?</text>

  <!-- FINALIZE (ellipse) at (920, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="920" cy="42" rx="36" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="920" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Finalize</text>

  <!-- EXIT (Msquare) at (155, 125) -->
  <polygon fill="none" stroke="#357f9e" points="137,107 173,107 173,143 137,143"/>
  <polyline fill="none" stroke="#357f9e" points="149,107 137,119"/>
  <polyline fill="none" stroke="#357f9e" points="137,131 149,143"/>
  <polyline fill="none" stroke="#357f9e" points="161,143 173,131"/>
  <polyline fill="none" stroke="#357f9e" points="173,119 161,107"/>
  <text xml:space="preserve" text-anchor="middle" x="155" y="129" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Exit</text>

  <!-- FIX (ellipse) at (785, 125) -->
  <ellipse fill="none" stroke="#357f9e" cx="785" cy="125" rx="20" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="785" y="129" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Fix</text>

  <!-- === EDGES === -->

  <!-- start → fetch -->
  <path fill="none" stroke="#666666" d="M75,42 L112,42"/>
  <polygon fill="#666666" stroke="#666666" points="112,38.5 122,42 112,45.5"/>

  <!-- fetch → analyze [Process] -->
  <path fill="none" stroke="#666666" d="M188,42 L235,42"/>
  <polygon fill="#666666" stroke="#666666" points="235,38.5 245,42 235,45.5"/>
  <text xml:space="preserve" text-anchor="middle" x="216" y="37" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Process</text>

  <!-- fetch → exit [Done] -->
  <path fill="none" stroke="#666666" d="M148,60 L148,97"/>
  <polygon fill="#666666" stroke="#666666" points="144.5,97 148,107 151.5,97"/>
  <text xml:space="preserve" text-anchor="middle" x="160" y="86" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Done</text>

  <!-- analyze → plan [Port] -->
  <path fill="none" stroke="#666666" d="M325,42 L360,42"/>
  <polygon fill="#666666" stroke="#666666" points="360,38.5 370,42 360,45.5"/>
  <text xml:space="preserve" text-anchor="middle" x="347" y="37" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Port</text>

  <!-- analyze → fetch [Skip] (backward, above) -->
  <path fill="none" stroke="#666666" d="M268,26 C255,2 185,2 172,26"/>
  <polygon fill="#666666" stroke="#666666" points="168,18 172,28 176,18"/>
  <text xml:space="preserve" text-anchor="middle" x="220" y="10" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Skip</text>

  <!-- plan → implement -->
  <path fill="none" stroke="#666666" d="M420,42 L454,42"/>
  <polygon fill="#666666" stroke="#666666" points="454,38.5 464,42 454,45.5"/>

  <!-- implement → validate -->
  <path fill="none" stroke="#666666" d="M556,42 L580,42"/>
  <polygon fill="#666666" stroke="#666666" points="580,38.5 590,42 580,45.5"/>

  <!-- validate → gate -->
  <path fill="none" stroke="#666666" d="M684,42 L712,42"/>
  <polygon fill="#666666" stroke="#666666" points="712,38.5 722,42 712,45.5"/>

  <!-- gate → finalize [Pass] -->
  <path fill="none" stroke="#666666" d="M848,42 L874,42"/>
  <polygon fill="#666666" stroke="#666666" points="874,38.5 884,42 874,45.5"/>
  <text xml:space="preserve" text-anchor="middle" x="866" y="37" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Pass</text>

  <!-- gate → fix [Fail] -->
  <path fill="none" stroke="#666666" d="M785,66 L785,97"/>
  <polygon fill="#666666" stroke="#666666" points="781.5,97 785,107 788.5,97"/>
  <text xml:space="preserve" text-anchor="middle" x="797" y="90" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Fail</text>

  <!-- fix → validate (backward curve) -->
  <path fill="none" stroke="#666666" d="M765,118 C725,110 695,88 672,68"/>
  <polygon fill="#666666" stroke="#666666" points="668,72 668,60 676,68"/>

  <!-- finalize → fetch (long backward loop below) -->
  <path fill="none" stroke="#666666" d="M920,60 C922,150 168,150 166,60"/>
  <polygon fill="#666666" stroke="#666666" points="162,66 166,56 170,66"/>
</g>
</svg>

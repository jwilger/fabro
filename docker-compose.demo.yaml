services:
  api:
    image: arc
    build:
      context: .
      platforms:
        - linux/arm64
    pull_policy: never
    command: ["api"]
    ports:
      - "3000:3000"

  web:
    image: arc
    pull_policy: never
    command: ["web"]
    ports:
      - "5173:5173"
    environment:
      - ARC_DEMO=1
    volumes:
      - ./docker/demo-server.toml:/root/.arc/server.toml:ro
    depends_on:
      - api

  docs:
    image: arc
    pull_policy: never
    command: ["docs"]
    ports:
      - "3333:3333"
    volumes:
      - ./docs:/app/docs:ro

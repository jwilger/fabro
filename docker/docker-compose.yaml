services:
  api:
    image: fabro
    build:
      context: ..
      dockerfile: docker/Dockerfile
      platforms:
        - linux/arm64
    pull_policy: never
    command: ["api"]
    ports:
      - "3000:3000"

  web:
    image: fabro
    pull_policy: never
    command: ["web"]
    ports:
      - "5173:5173"
    environment:
      - FABRO_DEMO=1
    volumes:
      - ./demo-server.toml:/root/.fabro/server.toml:ro
      - ../apps/fabro-web/public:/app/apps/fabro-web/public
    depends_on:
      - api

  docs:
    image: fabro
    pull_policy: never
    command: ["docs"]
    ports:
      - "3333:3333"
    volumes:
      - ../docs:/app/docs:ro

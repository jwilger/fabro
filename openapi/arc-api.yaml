openapi: "3.1.0"
info:
  title: Arc Run API
  version: "0.1.0"
  description: HTTP API for managing Arc workflow run executions.

tags:
  - name: Runs
    description: Run management operations
  - name: Run Outputs
    description: Files and verifications produced by runs
  - name: Run Internals
    description: Internal run details (stages, turns, context, configuration)
  - name: Human-in-the-Loop
    description: Questions, answers, and steering for runs
  - name: Workflows
    description: Workflow definitions and execution
  - name: Verifications
    description: Verification categories and controls
  - name: Sandbox
    description: Sandbox preview URLs
  - name: Usage
    description: Token and cost usage
  - name: Insights
    description: SQL query editor and history
  - name: Sessions
    description: Interactive chat sessions
  - name: Projects
    description: Project and branch management
  - name: Settings
    description: Platform configuration
  - name: Retros
    description: Run retrospectives

paths:
  # ── Runs ──────────────────────────────────────────────────────────────

  /runs:
    get:
      operationId: listRuns
      tags: [Runs]
      summary: List Runs
      responses:
        "200":
          description: Array of runs for the board view
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunListItem"
    post:
      operationId: startRun
      tags: [Runs]
      summary: Start Run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
      responses:
        "201":
          description: Run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRunResponse"
        "400":
          description: Invalid DOT source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{id}:
    get:
      operationId: retrieveRun
      tags: [Runs]
      summary: Retrieve Run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStatusResponse"
        "404":
          description: Run not found

  /runs/{id}/cancel:
    post:
      operationId: cancelRun
      tags: [Runs]
      summary: Cancel Run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: boolean
                required:
                  - cancelled
        "404":
          description: Run not found
        "409":
          description: Run is not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{id}/graph:
    get:
      operationId: retrieveRunSvg
      tags: [Runs]
      summary: Render SVG
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: SVG image of the workflow graph
          content:
            image/svg+xml:
              schema:
                type: string
        "404":
          description: Run not found
        "502":
          description: Graphviz not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{id}/checkpoint:
    get:
      operationId: retrieveRunCheckpoint
      tags: [Run Internals]
      summary: Retrieve Run Checkpoint
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Checkpoint data (null if not yet available)
          content:
            application/json:
              schema: {}
        "404":
          description: Run not found

  /runs/{id}/context:
    get:
      operationId: retrieveRunContext
      tags: [Run Internals]
      summary: Retrieve Run Context
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Context key-value map
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Run not found

  /runs/{id}/events:
    get:
      operationId: streamRunEvents
      tags: [Runs]
      summary: Stream Run Events
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Run not found
        "410":
          description: Event stream closed

  /runs/{id}/questions:
    get:
      operationId: listRunQuestions
      tags: [Human-in-the-Loop]
      summary: List Run Questions
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Array of pending questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiQuestion"
        "404":
          description: Run not found

  /runs/{id}/questions/{qid}/answer:
    post:
      operationId: submitRunAnswer
      tags: [Human-in-the-Loop]
      summary: Submit Run Answer
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: qid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
      responses:
        "200":
          description: Answer accepted or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponse"
        "400":
          description: Invalid option key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Run not found

  /runs/{id}/retro:
    get:
      operationId: retrieveRetro
      tags: [Retros]
      summary: Retrieve Retro
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Retro data (null if not yet available)
          content:
            application/json:
              schema: {}
        "404":
          description: Run not found

  /runs/{id}/stages:
    get:
      operationId: listRunStages
      tags: [Run Internals]
      summary: List Run Stages
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Array of run stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunStage"
        "404":
          description: Run not found

  /runs/{id}/stages/{stageId}/turns:
    get:
      operationId: listStageTurns
      tags: [Run Internals]
      summary: List Stage Turns
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: stageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of conversation turns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageTurn"
        "404":
          description: Run or stage not found

  /runs/{id}/files:
    get:
      operationId: listRunFiles
      tags: [Run Outputs]
      summary: List Run Files
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: checkpoint
          in: query
          schema:
            type: string
            default: "all"
      responses:
        "200":
          description: File changes with checkpoint metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunFiles"
        "404":
          description: Run not found

  /runs/{id}/usage:
    get:
      operationId: retrieveRunUsage
      tags: [Usage]
      summary: Retrieve Run Usage
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunUsage"
        "404":
          description: Run not found

  /runs/{id}/verifications:
    get:
      operationId: listRunVerifications
      tags: [Run Outputs]
      summary: List Run Verifications
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Array of verification categories with controls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunVerification"
        "404":
          description: Run not found

  /runs/{id}/configuration:
    get:
      operationId: retrieveRunConfiguration
      tags: [Run Internals]
      summary: Retrieve Run Configuration
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Configuration content
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Run not found

  /runs/{id}/steer:
    post:
      operationId: steerRun
      tags: [Human-in-the-Loop]
      summary: Steer Run
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteerRequest"
      responses:
        "200":
          description: Steering accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                required:
                  - accepted
        "404":
          description: Run not found

  /runs/{id}/preview:
    post:
      operationId: generatePreviewUrl
      tags: [Sandbox]
      summary: Preview URL
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewUrlRequest"
      responses:
        "200":
          description: Preview URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewUrlResponse"
        "404":
          description: Run not found

  # ── Workflows ─────────────────────────────────────────────────────────

  /workflows:
    get:
      operationId: listWorkflows
      tags: [Workflows]
      summary: List Workflows
      responses:
        "200":
          description: Array of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowListItem"

  /workflows/{name}:
    get:
      operationId: retrieveWorkflow
      tags: [Workflows]
      summary: Retrieve Workflow
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
        "404":
          description: Workflow not found

  /workflows/{name}/runs:
    get:
      operationId: listWorkflowRuns
      tags: [Workflows]
      summary: List Workflow Runs
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunListItem"
        "404":
          description: Workflow not found
    post:
      operationId: startWorkflowRun
      tags: [Workflows]
      summary: Start Workflow Run
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRunResponse"
        "404":
          description: Workflow not found

  # ── Verifications ─────────────────────────────────────────────────────

  /verifications:
    get:
      operationId: listVerifications
      tags: [Verifications]
      summary: List Verifications
      responses:
        "200":
          description: Array of verification categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VerificationCategory"

  /verifications/{slug}:
    get:
      operationId: retrieveVerification
      tags: [Verifications]
      summary: Retrieve Verification
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification control detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationDetailResponse"
        "404":
          description: Control not found

  # ── Retros ────────────────────────────────────────────────────────────

  /retros:
    get:
      operationId: listRetros
      tags: [Retros]
      summary: List Retros
      responses:
        "200":
          description: Array of retros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetroListItem"

  # ── Sessions ──────────────────────────────────────────────────────────

  /sessions:
    get:
      operationId: listSessions
      tags: [Sessions]
      summary: List Sessions
      responses:
        "200":
          description: Array of session groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionGroup"
    post:
      operationId: createSession
      tags: [Sessions]
      summary: Create Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"

  /sessions/{id}:
    get:
      operationId: retrieveSession
      tags: [Sessions]
      summary: Retrieve Session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found

  /sessions/{id}/messages:
    post:
      operationId: sendSessionMessage
      tags: [Sessions]
      summary: Send Session Message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                required:
                  - accepted
        "404":
          description: Session not found

  /sessions/{id}/events:
    get:
      operationId: streamSessionEvents
      tags: [Sessions]
      summary: Stream Session Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Session not found

  # ── Insights ──────────────────────────────────────────────────────────

  /insights/queries:
    get:
      operationId: listSavedQueries
      tags: [Insights]
      summary: List Saved Queries
      responses:
        "200":
          description: Array of saved queries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedQuery"
    post:
      operationId: createSavedQuery
      tags: [Insights]
      summary: Create Saved Query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveQueryRequest"
      responses:
        "201":
          description: Query saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQuery"

  /insights/queries/{id}:
    put:
      operationId: updateSavedQuery
      tags: [Insights]
      summary: Update Saved Query
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveQueryRequest"
      responses:
        "200":
          description: Query updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQuery"
        "404":
          description: Query not found
    delete:
      operationId: deleteSavedQuery
      tags: [Insights]
      summary: Delete Saved Query
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Query deleted
        "404":
          description: Query not found

  /insights/execute:
    post:
      operationId: executeQuery
      tags: [Insights]
      summary: Execute Query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteQueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteQueryResponse"

  /insights/history:
    get:
      operationId: listQueryHistory
      tags: [Insights]
      summary: List Query History
      responses:
        "200":
          description: Array of history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  # ── Settings ──────────────────────────────────────────────────────────

  /settings:
    get:
      operationId: retrieveServerSettings
      tags: [Settings]
      summary: Retrieve Server Settings
      responses:
        "200":
          description: Array of setting groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettingGroup"

  # ── Projects ──────────────────────────────────────────────────────────

  /projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: List Projects
      responses:
        "200":
          description: Array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}/branches:
    get:
      operationId: listBranches
      tags: [Projects]
      summary: List Branches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
        "404":
          description: Project not found

components:
  parameters:
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    # ── Existing Run Schemas ────────────────────────────────────────────

    RunStatus:
      type: string
      enum:
        - running
        - completed
        - failed
        - cancelled

    StartRunRequest:
      type: object
      required:
        - dot_source
      properties:
        dot_source:
          type: string

    StartRunResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string

    RunStatusResponse:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/RunStatus"
        error:
          type: string

    ApiQuestionOption:
      type: object
      required:
        - key
        - label
      properties:
        key:
          type: string
        label:
          type: string

    ApiQuestion:
      type: object
      required:
        - id
        - text
        - question_type
        - options
        - allow_freeform
      properties:
        id:
          type: string
        text:
          type: string
        question_type:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/ApiQuestionOption"
        allow_freeform:
          type: boolean

    SubmitAnswerRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
        selected_option_key:
          type: string

    SubmitAnswerResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    # ── New Run Schemas ─────────────────────────────────────────────────

    RunListItemStatus:
      type: string
      enum:
        - working
        - pending
        - review
        - merge

    CheckRunStatus:
      type: string
      enum:
        - success
        - failure
        - skipped
        - pending
        - queued

    CheckRun:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/CheckRunStatus"
        duration_secs:
          type: number

    RunListItem:
      type: object
      required:
        - id
        - repo
        - title
        - workflow
        - status
      properties:
        id:
          type: string
        repo:
          type: string
        title:
          type: string
        workflow:
          type: string
        status:
          $ref: "#/components/schemas/RunListItemStatus"
        number:
          type: integer
        additions:
          type: integer
        deletions:
          type: integer
        checks:
          type: array
          items:
            $ref: "#/components/schemas/CheckRun"
        elapsed_secs:
          type: number
        elapsed_warning:
          type: boolean
        resources:
          type: string
        comments:
          type: integer
        question:
          type: string
        sandbox_id:
          type: string

    StageStatus:
      type: string
      enum:
        - completed
        - running
        - pending
        - failed

    RunStage:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/StageStatus"
        duration_secs:
          type: number
        dot_id:
          type: string

    ToolUse:
      type: object
      required:
        - tool_name
        - args
        - result
      properties:
        tool_name:
          type: string
        args:
          type: string
        result:
          type: string

    StageTurn:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - system
            - assistant
            - tool
        content:
          type: string
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolUse"

    FileCheckpoint:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
        label:
          type: string

    DiffFile:
      type: object
      required:
        - name
        - contents
      properties:
        name:
          type: string
        contents:
          type: string

    FileDiff:
      type: object
      required:
        - old_file
        - new_file
      properties:
        old_file:
          $ref: "#/components/schemas/DiffFile"
        new_file:
          $ref: "#/components/schemas/DiffFile"

    DiffStats:
      type: object
      required:
        - additions
        - deletions
      properties:
        additions:
          type: integer
        deletions:
          type: integer

    RunFiles:
      type: object
      required:
        - checkpoints
        - files
        - stats
      properties:
        checkpoints:
          type: array
          items:
            $ref: "#/components/schemas/FileCheckpoint"
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileDiff"
        stats:
          $ref: "#/components/schemas/DiffStats"

    UsageStage:
      type: object
      required:
        - stage
        - model
        - input_tokens
        - output_tokens
        - runtime_secs
        - cost
      properties:
        stage:
          type: string
        model:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        runtime_secs:
          type: number
        cost:
          type: number

    UsageTotals:
      type: object
      required:
        - runtime_secs
        - input_tokens
        - output_tokens
        - cost
      properties:
        runtime_secs:
          type: number
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost:
          type: number

    UsageByModel:
      type: object
      required:
        - model
        - stages
        - input_tokens
        - output_tokens
        - cost
      properties:
        model:
          type: string
        stages:
          type: integer
        input_tokens:
          type: integer
        output_tokens:
          type: integer
